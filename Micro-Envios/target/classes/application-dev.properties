spring.application.name=Micro-Envios

spring.datasource.url=jdbc:mysql://localhost:3306/db_micro_envio_dev
spring.datasource.username=root
spring.datasource.password=root

server.port = 8083

spring.jpa.hibernate.ddl-auto=create
